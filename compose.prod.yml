services:
  app:
    build:
      context: .
    volumes:
      - homelab_repo:/homelab
    env_file:
      - .env
    environment:
      - HOMELAB_REPO_PATH=/homelab
    ports:
      - "80:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  homelab_repo:
